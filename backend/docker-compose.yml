services:
  neo4j:
    image: neo4j:5-community
    container_name: setu-neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=neo4j/setu_dev_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    container_name: setu-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=setu
      - POSTGRES_PASSWORD=setu_dev_password
      - POSTGRES_DB=setu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setu -d setu"]
      interval: 10s
      timeout: 5s
      retries: 10

  # api:
  #   FastAPI service — intentionally not added yet.
  #   This gets uncommented in Phase 11 (Hardening) once ingestion + all
  #   4 agents work end-to-end against the two services above.
  #   build: .
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   depends_on:
  #     neo4j:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
